# Tool Configuration
# Define which tools are enabled and their settings

tools:
  # Filesystem tool
  fs:
    enabled: true
    description: "Filesystem operations (read, write, list, search)"

  # Web tool
  web:
    enabled: true
    description: "HTTP requests and web search"
    search_provider: duckduckgo
    user_agent: "Nerva/0.2.0"

  # Process tool
  process:
    enabled: true
    description: "Execute system commands"

  # Git tool
  git:
    enabled: true
    description: "Git version control operations"

  # Code analysis tool
  code:
    enabled: true
    description: "Code analysis, explanation, and refactoring"

  # Clipboard tool
  clipboard:
    enabled: true
    description: "System clipboard read/write"

  # Docker tool
  docker:
    enabled: false
    description: "Docker container management"

  # Database tool
  database:
    enabled: false
    description: "SQLite database queries"

  # PDF tool
  pdf:
    enabled: true
    description: "PDF reading and text extraction"

  # SSH tool
  ssh:
    enabled: false
    description: "Remote server commands via SSH"

  # Email tool
  email:
    enabled: false
    description: "Send and read emails"

  # Calendar tool
  calendar:
    enabled: false
    description: "Google Calendar management"

  # Image analysis tool
  image:
    enabled: false
    description: "Image analysis via vision models"

  # Audio tool
  audio:
    enabled: false
    description: "Audio transcription and text-to-speech"

  # Screenshot tool
  screenshot:
    enabled: false
    description: "Screen capture"
